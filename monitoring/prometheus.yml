global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: mailguardianx

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: orchestrator
    metrics_path: /metrics
    static_configs:
      - targets: ["orchestrator:8000"]
        labels:
          service: orchestrator
          component: api

  # Note: le Celery worker n'expose pas de /metrics HTTP.
  # Le monitoring Celery passe par les métriques Redis (broker) ou Flower (optionnel).
